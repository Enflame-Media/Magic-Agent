version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      day: monday
      time: "09:00"
      timezone: America/Denver
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
      - security
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      day: monday
      time: "09:00"
      timezone: America/Denver
    commit-message:
      prefix: ci(deps)
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /apps/admin/api
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /apps/admin/web
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /apps/cli
    schedule:
      interval: daily

  - package-ecosystem: bundler
    directory: /apps/mobile/android/fastlane
    schedule:
      interval: daily

  - package-ecosystem: bundler
    directory: /apps/mobile/ios
    schedule:
      interval: daily

  - package-ecosystem: docker
    directory: /apps/server/docker
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /apps/server/docker
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /apps/server/workers
    schedule:
      interval: daily

  - package-ecosystem: docker
    directory: /apps/web/react
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /apps/web/react
    schedule:
      interval: daily

  - package-ecosystem: cargo
    directory: /apps/web/react/src-tauri
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /apps/web/vue
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /apps/web/vue/scripts/pwa-screenshots
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /dev/lint-rules
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /packages/schema/errors
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /packages/schema/protocol
    schedule:
      interval: daily
